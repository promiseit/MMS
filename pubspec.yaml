name: autism_work_integration_tool
description: A tool to help autistic individuals integrate into the workplace through gamified training.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/data/

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
